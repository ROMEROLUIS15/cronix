name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
    inputs:
      function_name:
        description: 'Name of the function to deploy (e.g., process-whatsapp, voice-worker)'
        required: true
        default: 'process-whatsapp'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function
        run: |
          supabase functions deploy ${{ github.event.inputs.function_name }} --use-api --project-ref psuthbtdvprojdbsimvq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
