name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch: # manual trigger — runs the full authenticated E2E suite (e2e-full)

# Dedupe runs for the SAME commit. develop is ff-merged to main, so the same SHA
# lands on two branches and (with `push: ['**']`) would otherwise trigger this
# workflow twice — duplicate check-runs + a lingering "pending" status. Keying the
# group by SHA collapses those into one run; cancel-in-progress also drops a stale
# run when a newer commit supersedes it on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_SUPABASE_URL:       ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY:  ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY:      ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_AXIOM_DATASET:      ${{ secrets.NEXT_PUBLIC_AXIOM_DATASET }}
  AXIOM_TOKEN:                    ${{ secrets.AXIOM_TOKEN }}
  E2E_TEST_EMAIL:                 ${{ secrets.E2E_TEST_EMAIL }}
  E2E_TEST_PASSWORD:              ${{ secrets.E2E_TEST_PASSWORD }}

jobs:
  # ── Job 1: Unit & Repository Tests ────────────────────────────────────────
  unit:
    name: Unit & Repository Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Deterministic E2E golden CONVERSATION evals for the WhatsApp agent: drives the real
      # runAgentLoop across multi-turn flows (LLM/DB mocked), 0 network, BLOCKING. Runs first
      # so a behaviour regression in a golden scenario fails fast with a clear name.
      - name: Agent E2E conversation evals (golden)
        run: npm run test:evals:agent

      - name: Run Unit & Repository Tests (Vitest)
        run: npm test

      - name: Run Lint
        run: npm run lint

      # Dead-code / unused-dependency detection. BLOCKING on the high-signal rules
      # (unused/unlisted/unresolved dependencies + binaries) — this is what caught
      # two ghost subsystems and the dead Vercel AI SDK in the June 2026 audit.
      # Unused files/exports/types are reported as warnings (knip.json `rules`):
      # a triage backlog of intentional public-API surface predates strict enforcement
      # there — see docs/architecture/AUDIT_BACKLOG.md.
      - name: Dead-code scan (knip)
        run: npm run knip

      # SDD spec↔code drift: fails if a file path cited in docs/specs/ no longer
      # exists on disk (the "dead map" class the June 2026 SDD audit found).
      # Non-blocking for now (continue-on-error) — same warning-first rollout knip
      # had; promote to blocking once the spec touch-up backlog settles.
      - name: SDD spec-drift check
        run: npm run check:spec-drift
        continue-on-error: true

  # ── Job 1.5: Production Build Verification ────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [unit]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Production Bundle
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Verify Build Output
        run: |
          echo "Build completed successfully"
          ls -la .next/standalone/ 2>/dev/null || echo "Standalone output not found, checking .next/..."
          ls -la .next/

  # ── Job 2: Integration Tests (only on push — not on every PR draft) ────────
  integration:
    name: Integration Tests (AI → DB)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Integration Tests (Vitest Node)
        run: npx vitest run --config vitest.integration.config.ts

  # ── Job 3: Smoke E2E (push to main/develop) — fast, unauthenticated ──────────
  # Only the smoke project runs on push: it needs no auth/test-data and finishes
  # in a couple of minutes. The full authenticated suite is manual (e2e-full)
  # because it depends on real Supabase test-env state that CI doesn't provision —
  # running it on every push burned ~50 min and was always red.
  # continue-on-error keeps it non-blocking; timeout-minutes caps any hang.
  e2e:
    name: E2E Smoke Tests (Playwright)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && github.event_name == 'push'
    needs: [unit, build]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build production bundle
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Copy standalone static assets
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Run smoke tests
        run: npx playwright test --project=smoke --reporter=list
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: 'http://localhost:3000'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7

  # ── Job 4: Full authenticated E2E (manual only — workflow_dispatch) ──────────
  # Run from the Actions tab when the Supabase test-env state is provisioned.
  # webServer uses `node .next/standalone/server.js` (see playwright.config.ts).
  # Static assets are copied into the standalone bundle in the step below.
  e2e-full:
    name: E2E Full Suite (Playwright, manual)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Build production bundle
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Copy standalone static assets
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Setup E2E test data
        run: npx tsx scripts/setup-e2e-data.ts

      - name: Create auth directory
        run: mkdir -p playwright/.auth

      - name: Run full E2E suite
        run: npx playwright test --project=setup --project=chromium --project=smoke --reporter=list,html
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: 'http://localhost:3000'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: playwright-report-full
          path: playwright-report/
          retention-days: 7

  # ── Job 5: Authenticated E2E vs an EPHEMERAL Supabase (E1 remediation) ────────
  # Spins up a throwaway Supabase (CLI + Docker) seeded from the repo's migrations
  # + seed.sql, then seeds the E2E fixture and runs a focused auth subset in
  # chromium. It NEVER touches the production database — the prod secrets are
  # deliberately overridden with the local instance's URL/keys.
  #
  # STATUS (E1): the ephemeral stack is PROVEN end-to-end in CI (start → 81
  # migrations → seed.sql → fixture → build → app serving → Playwright running;
  # direct-URL authed pages pass). BUT the dashboard-core subset still fails: the
  # dashboard SHELL (sidebar navigation, avatar, responsive layout) doesn't mount
  # its interactive UI under the ephemeral build — sidebar-click/nav tests fail
  # while direct page.goto content assertions pass. That's an E2E-stabilization
  # task (likely client hydration / a missing runtime env), not validatable locally.
  #
  # Kept as workflow_dispatch (MANUAL) so it does NOT add red noise to every PR.
  # To finish E1: stabilize the dashboard shell under the ephemeral build, then
  # switch `if:` to pull_request and mark "E2E Auth" a required check (blocking).
  e2e-auth:
    name: E2E Auth (ephemeral Supabase)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch'
    needs: [unit]

    # Override the workflow-level prod secrets: this job must talk ONLY to the
    # local ephemeral Supabase, never production.
    env:
      NEXT_PUBLIC_SUPABASE_URL: ''
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ''
      SUPABASE_SERVICE_ROLE_KEY: ''

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start ephemeral Supabase (applies migrations + seed.sql)
        run: supabase start

      - name: Export local Supabase URL + keys (overrides prod)
        run: |
          STATUS=$(supabase status -o json)
          echo "NEXT_PUBLIC_SUPABASE_URL=$(echo "$STATUS" | jq -r '.API_URL')"              >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(echo "$STATUS" | jq -r '.ANON_KEY')"        >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$(echo "$STATUS" | jq -r '.SERVICE_ROLE_KEY')"    >> "$GITHUB_ENV"
          echo "CRON_SECRET=e2e-local-cron-secret"                                          >> "$GITHUB_ENV"

      - name: Seed E2E fixture data
        run: npm run e2e:setup

      - name: Build production bundle (against local Supabase)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Copy standalone static assets
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Create auth directory
        run: mkdir -p playwright/.auth

      # Authenticated subset only: dashboard-core runs under the chromium project
      # (logged-in storageState). auth-login is an UNAUTHENTICATED-page suite — it
      # belongs to the smoke job, not here (logged-in → /login redirects to /dashboard).
      - name: Run auth E2E subset (chromium, with retries)
        run: npx playwright test --project=chromium dashboard-core-pages.spec.ts --reporter=list
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: 'http://localhost:3000'

      - name: Stop Supabase
        if: always()
        run: supabase stop || true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: playwright-report-e2e-auth
          path: playwright-report/
          retention-days: 7

